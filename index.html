        body {
            margin: 0;

            background-color: #050505;

            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #player-container {
            width: 100%;
            max-width: 800px;
            background-color: #111;
            padding: 0;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            margin-bottom: 20px;
        }

        #player {
            width: 100%;
        }

        #logo-overlay {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 35px; 
            height: 35px;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            pointer-events: none;
            z-index: 10;
            display: none;
        }

        #logo-overlay img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 12px;
            width: 100%;
            max-width: 800px;
        }

        .channel {
            text-align: center;
            background-color: #1a1a1a;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #333;
        }

        .channel:hover {
            transform: scale(1.05);
            background-color: #2a2a2a;
            border-color: #555;
        }

        .channel img {
            width: 45px;
            height: 45px;
            object-fit: contain;
            border-radius: 5px;
        }

        .channel-name {
            color: #eee;
            margin-top: 8px;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;

        .footer-credit {

            padding: 30px 10px 10px 10px;
            text-align: center;
            width: 100%;
            color: #888;
            font-size: 12px;
        }

        @media (max-width: 480px) {
            .channel-grid {

            }
            .channel img {

            }

    <script>
        var playerInstance = jwplayer("player");

        function changeChannel(file, keyId, key) {
            
            // เช็คว่านามสกุลไฟล์เป็น .m3u8 หรือไม่ ถ้าใช่ให้เป็น hls ถ้าไม่ใช่ให้เป็น dash
            var streamType = file.includes('.m3u8') ? 'hls' : 'dash';

            var sourceConfig = {
                file: file,
                type: streamType
            };

            // ใส่ DRM เฉพาะเมื่อมี keyId และ key ส่งมาด้วย
            if (keyId && key) {
                sourceConfig.drm = {
                    clearkey: {
                        keyId: keyId,
                        key: key
                    }
                };
            }

            playerInstance.load([sourceConfig]);
            playerInstance.play();

            var logoOverlay = document.getElementById('logo-overlay');
            logoOverlay.style.display = 'block';
            
            setTimeout(() => {
                logoOverlay.style.opacity = '0.7';
            }, 10);

            setTimeout(() => {
                logoOverlay.style.opacity = '0';
                setTimeout(() => {
                    logoOverlay.style.display = 'none';
                }, 500);
            }, 5000);
        }

        playerInstance.setup({
            playlist: [{
                sources: [
                    {
                        type: "dash",
                        file: 'https://cri-streamer3.cdn.3bbtv.com:8443/3bb/live/5/5.mpd',
                        drm: {
                            clearkey: {
                                keyId: "87db4361f7894655a4656e9c8b935a02",
                                key: "b025a4b950df41158a87cfc8d6f2ac34"
                            }
                        },
                        label: "1080HD"
                    }
                ]
            }],
            width: "100%",
            aspectratio: "16:9",
            autostart: true,
            mute: false
        });
    </script>
