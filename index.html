<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="referrer" content="no-referrer">
    
    <title>Premium Sports (Static Version)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <style>
        :root {
            --bg-dark: #0a0a0c;
            --bg-card: #18181c;
            --primary: #00ff88;
            --primary-glow: rgba(0, 255, 136, 0.4);
            --text-main: #ffffff;
            --text-muted: #888890;
            
            --plyr-color-main: var(--primary);
            --plyr-video-control-background-hover: rgba(0, 255, 136, 0.2);
            --plyr-menu-background: var(--bg-card);
            --plyr-menu-color: var(--text-main);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Kanit', 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden !important; 
            touch-action: none;
            background-color: #000; 
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 900px; 
            height: 100%;
            background-color: var(--bg-dark);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .player-wrapper {
            width: 100%;
            flex-shrink: 0;
            max-height: 60vh; 
            aspect-ratio: 16/9;
            background: #000;
            position: relative;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .plyr {
            width: 100%;
            height: 100%;
            max-height: 60vh;
        }
        .plyr__video-wrapper {
            height: 100%;
            background: #000;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            background: #000;
        }

        .loader-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99; 
            transition: opacity 0.4s ease;
            gap: 20px;
        }
        .loader-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .spinner {
            width: 45px; height: 45px;
            border: 3px solid rgba(255,255,255,0.05);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .status-text {
            color: var(--primary);
            font-size: 13px;
            letter-spacing: 1.5px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .content {
            flex: 1; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
            padding: 20px;
            padding-bottom: env(safe-area-inset-bottom, 30px);
        }

        .content::-webkit-scrollbar { width: 6px; }
        .content::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-left: 3px solid var(--primary);
            padding-left: 10px;
        }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 15px;
        }

        @media (min-width: 600px) {
            .channel-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
        }

        .channel-card {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 20px 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .channel-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .channel-card:active { transform: scale(0.97); }

        .channel-card.active {
            border-color: var(--primary);
            background: linear-gradient(145deg, rgba(0,255,136,0.05) 0%, rgba(24,24,28,1) 100%);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .ch-icon {
            width: 55px; height: 55px;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s ease;
            overflow: hidden; 
        }
        .channel-card.active .ch-icon {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            transform: scale(1.05);
        }

        .ch-logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            background-color: transparent;
            padding: 5px;
        }

        .ch-icon-text { font-size: 22px; font-weight: 600; color: #fff; }
        .channel-card.active .ch-icon-text { color: var(--primary); }

        .ch-name {
            font-size: 14px;
            font-weight: 500;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-main);
        }

        .ch-type {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
            background: rgba(255,255,255,0.05);
            padding: 3px 10px;
            border-radius: 20px;
            text-transform: uppercase;
        }
        .channel-card.active .ch-type {
            color: var(--primary);
            background: rgba(0, 255, 136, 0.1);
        }

        .error-toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #ff3333; color: white;
            padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 500;
            box-shadow: 0 5px 15px rgba(255, 51, 51, 0.3);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000; display: flex; align-items: center; gap: 8px;
        }
        .error-toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="player-wrapper">
            <div class="loader-overlay" id="loader">
                <div class="spinner"></div>
                <div class="status-text" id="status-text">กำลังโหลดบัฟเฟอร์...</div>
            </div>
            <video id="video-player" playsinline autoplay muted></video>
        </div>

        <div class="content">
            <div class="section-title">Channels</div>
            <div class="channel-grid" id="channel-list">
            </div>
        </div>
    </div>

    <div class="error-toast" id="error-toast">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        <span id="error-msg">ไม่สามารถโหลดสตรีมได้</span>
    </div>

    <script>
        const channels = [
            { id: 'epl1', name: 'EPL 1', url: 'https://www.livedoomovies.com:4431/02_epl1_720p/playlist.m3u8', type: 'FHD', logo: '' },
            { id: 'epl2', name: 'EPL 2', url: 'https://www.livedoomovies.com:4431/02_epl2_720p/playlist.m3u8', type: 'FHD', logo: '' },
            { id: 'epl3', name: 'EPL 3', url: 'https://www.livedoomovies.com:4431/02_epl3_720p/playlist.m3u8', type: 'FHD', logo: '' },
            { id: 'b1', name: 'beIN 1', url: 'https://bein1th-720.shchenyu8810.workers.dev/play/bein1', type: 'FHD', logo: '' },
            { id: 'b2', name: 'beIN 2', url: 'https://bein2th-720.shchenyu8810.workers.dev/play/bein2', type: 'FHD', logo: '' },
            { id: 'b3', name: 'beIN 3', url: 'https://bein3th-720.shchenyu8810.workers.dev/play/bein3', type: 'FHD', logo: '' }
        ];

        let hls = null;
        const video = document.getElementById('video-player');
        const loader = document.getElementById('loader');
        const statusText = document.getElementById('status-text');
        const errorToast = document.getElementById('error-toast');
        let errorTimeout;

        const player = new Plyr(video, {
            controls: ['play-large', 'play', 'mute', 'volume', 'fullscreen'], 
            autoplay: true,
            muted: true,
            ratio: '16:9'
        });

        function renderChannels() {
            const container = document.getElementById('channel-list');
            container.innerHTML = '';

            channels.forEach((ch) => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.id = 'card-' + ch.id;
                
                let iconHtml = '';
                if (ch.logo && ch.logo.trim() !== '') {
                    iconHtml = '<img src="' + ch.logo + '" class="ch-logo-img" alt="' + ch.name + '">';
                } else {
                    const shortName = ch.name.replace(/[^0-9]/g, '');
                    const iconText = shortName ? shortName : ch.name.charAt(0);
                    iconHtml = '<div class="ch-icon-text">' + iconText + '</div>';
                }

                card.innerHTML = '<div class="ch-icon">' + iconHtml + '</div>' +
                                 '<div class="ch-name">' + ch.name + '</div>' +
                                 '<div class="ch-type">' + ch.type + '</div>';

                card.onclick = () => playStream(ch.url, ch.id);
                container.appendChild(card);
            });

            if(channels.length > 0) {
                playStream(channels[0].url, channels[0].id);
            }
        }

        function playStream(url, channelId) {
            document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
            const activeCard = document.getElementById('card-' + channelId);
            if(activeCard) activeCard.classList.add('active');

            loader.classList.remove('hidden');
            statusText.innerText = 'กำลังโหลดบัฟเฟอร์...';

            if (hls) {
                hls.destroy();
                hls = null;
            }
            video.pause();

            if (Hls.isSupported()) {
                const currentHls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: false,
                    backBufferLength: 90,
                    maxBufferLength: 30, 
                    maxMaxBufferLength: 600, 
                    liveSyncDurationCount: 3, 
                    xhrSetup: function(xhr, u) {
                        // ❌ ไม่สามารถใส่ xhr.setRequestHeader('Referer', '...') ตรงนี้ได้
                        // เพราะเบราว์เซอร์จะบล็อก Forbidden Header ทันที
                        xhr.open('GET', u, true);
                    }
                });
                
                hls = currentHls;
                currentHls.networkRetryCount = 0;

                // ดึงสตรีมตรงๆ (Direct Play) ไม่ผ่าน Proxy
                currentHls.loadSource(url);
                currentHls.attachMedia(video);

                currentHls.on(Hls.Events.MANIFEST_PARSED, function () {
                    player.play().catch(e => {
                        console.log('Autoplay prevented:', e);
                        player.muted = true;
                        player.play().catch(err => console.error("Playback failed", err));
                    });
                });

                currentHls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                if (currentHls.networkRetryCount < 3) {
                                    currentHls.networkRetryCount++;
                                    setTimeout(() => {
                                        if (hls === currentHls) currentHls.startLoad();
                                    }, 1000);
                                } else {
                                    currentHls.destroy();
                                    // หากขึ้น Error นี้บน GitHub Pages มีโอกาสสูงที่เป้าหมายบล็อก CORS หรือเช็ค Referer
                                    showError('เป้าหมายบล็อกการดึงข้อมูล (CORS / Referer) หรือสตรีมออฟไลน์');
                                    loader.classList.add('hidden');
                                }
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                currentHls.recoverMediaError();
                                break;
                            default:
                                currentHls.destroy();
                                showError('สตรีมออฟไลน์ หรือลิงก์เสีย');
                                loader.classList.add('hidden');
                                break;
                        }
                    }
                });

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.onloadedmetadata = function () {
                    player.play().catch(e => {
                        player.muted = true;
                        player.play();
                    });
                };
                video.onerror = function() {
                    showError('ไม่สามารถเล่นวิดีโอนี้ได้');
                    loader.classList.add('hidden');
                };
            } else {
                showError('เบราว์เซอร์ไม่รองรับ');
                loader.classList.add('hidden');
            }
        }

        function showError(msg) {
            const msgEl = document.getElementById('error-msg');
            msgEl.innerText = msg;
            errorToast.classList.add('show');
            clearTimeout(errorTimeout);
            errorTimeout = setTimeout(() => {
                errorToast.classList.remove('show');
            }, 4000);
        }

        const hideLoader = () => loader.classList.add('hidden');
        
        video.addEventListener('waiting', () => {
            if (!video.paused) {
                statusText.innerText = 'กำลังโหลดข้อมูล...';
                loader.classList.remove('hidden');
            }
        });
        
        video.addEventListener('playing', hideLoader);
        video.addEventListener('canplay', hideLoader);
        video.addEventListener('loadeddata', hideLoader);
        video.addEventListener('pause', hideLoader);
        video.addEventListener('error', hideLoader);

        document.addEventListener('DOMContentLoaded', renderChannels);

    </script>
</body>
</html>
